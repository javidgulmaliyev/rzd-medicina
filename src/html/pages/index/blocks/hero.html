<section class="hero" id="section-hero" aria-labelledby="title-hero">
  <div class="hero__inner container">
    <div class="hero__content">
      <h1 class="hero__title hero-title" id="title-hero">
        <span class="hero-title__caption">Лечение у&nbsp;дерматолога</span>
        <span class="hero-title__city">в&nbsp;Вологде</span>
      </h1>
      <div class="hero__service hero-service">
        <div class="hero-service__name">Первичный прием</div>
        <div class="hero-service__price">
          <div class="hero-service__old">1600<span class="hero-service__currency">₽</span></div>
          <div class="hero-service__discount">–30&nbsp;%</div>
          <div class="hero-service__current">1120<span class="hero-service__currency">₽</span></div>
        </div>
      </div>
      <div class="hero-consultation">Консультация —&#32;<mark class="hero-consultation__mark">бесплатно</mark></div>
    </div>
    <div class="hero__image responsive-media">
      <picture>
        <source srcset="img/images/pages/index/hero/1.webp" type="image/webp" media="(min-width: 768.1px)">
        <source srcset="img/images/pages/index/hero/1.jpg" type="image/jpeg" media="(min-width: 768.1px)">
        <source srcset="img/images/pages/index/hero/2.webp" type="image/webp">
        <img src="img/images/pages/index/hero/2.jpg" alt="">
      </picture>
    </div>
  </div>
  <div class="hero__bottom container">
    <button class="hero__button button" data-dialog-id="appointment-dialog">
      <span class="button__text">ЗАПИСАТЬСЯ НА ПРИЕМ К ДЕРМАТОЛОГУ</span>
    </button>
  </div>
</section>
